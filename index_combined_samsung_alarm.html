<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Reminder</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <style>
/* ==========================
   PREMIUM REMINDER APP
   Color Theme
   Cotton White
   Cherry Red
   Maroon
   Noir Black
==========================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Outfit',sans-serif;
    background:#F8F7F4; /* Cotton White */
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px 15px;
    color:#111111;
}

.container{
    width:100%;
    max-width:520px;
}

/* Header */

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:40px;
    color:#7A001F; /* Maroon */
    font-weight:700;
    letter-spacing:1px;
}

.header p{
    margin-top:8px;
    color:#666;
    font-size:15px;
}

/* Card */

.card{
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#7A001F;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#f3f3f3;
    font-size:16px;
    outline:none;
    transition:.3s;
}

.input-group input:focus{
    background:white;
    border:2px solid #C21833; /* Cherry Red */
}

/* Button */

#addBtn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-size:17px;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#C21833,#7A001F);
    transition:.3s;
}

#addBtn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 25px rgba(122,0,31,.35);
}

/* Reminder List */

.list-header{
    margin-bottom:15px;
}

.list-header h2{
    color:#7A001F;
}

#reminderList{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* Reminder Card */

.reminder{
    background:white;
    border-radius:22px;
    padding:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    animation:fadeIn .4s ease;
}

.reminder h3{
    font-size:20px;
    color:#111;
}

.reminder p{
    margin-top:8px;
    color:#555;
    font-size:15px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.buttons button{
    flex:1;
    padding:11px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.edit{
    background:#C21833;
    color:white;
}

.edit:hover{
    background:#980E26;
}

.delete{
    background:#111111;
    color:white;
}

.delete:hover{
    background:black;
}

/* Completed */

.completed{
    opacity:.6;
    text-decoration:line-through;
}

/* Empty Text */

.empty{
    text-align:center;
    color:#777;
    padding:40px;
}

/* Animation */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Responsive */

@media(max-width:600px){

.container{
max-width:100%;
}

.card{
padding:20px;
}

.header h1{
font-size:32px;
}

}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Reminder</h1>
        <p>Never miss an important moment.</p>
    </div>

    <div class="card">

        <div class="input-group">
            <label>Reminder Title</label>
            <input
                type="text"
                id="title"
                placeholder="Enter reminder..."
            >
        </div>

        <div class="input-group">
            <label>Date</label>
            <input
                type="date"
                id="date"
            >
        </div>

        <div class="input-group">
            <label>Time</label>
            <input
                type="time"
                id="time"
            >
        </div>

        <button id="addBtn">
            Add Reminder
        </button>

    </div>

    <div class="list-area">

        <div class="list-header">
            <h2>Your Reminders</h2>
        </div>

        <div id="reminderList">

            <!-- Reminder Cards -->

        </div>

    </div>

</div>

const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const addBtn = document.getElementById("addBtn");
const reminderList = document.getElementById("reminderList");
const alarm = document.getElementById("alarm");

// Reminder Array
let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

// Edit Mode
let editIndex = -1;

// Save to Local Storage
function saveReminders() {
    localStorage.setItem("reminders", JSON.stringify(reminders));
}

// Display Reminders
function displayReminders() {

    reminderList.innerHTML = "";

    if (reminders.length === 0) {

        reminderList.innerHTML = `
            <div class="empty">
                No reminders added yet.
            </div>
        `;

        return;
    }

    reminders.forEach((item, index) => {

        const card = document.createElement("div");

        card.className =
            item.completed
                ? "reminder completed"
                : "reminder";

        card.innerHTML = `
            <h3>${item.title}</h3>

            <p>
                📅 ${item.date}
            </p>

            <p>
                ⏰ ${item.time}
            </p>

            <div class="buttons">

                <button
                    class="edit"
                    onclick="editReminder(${index})">
                    Edit
                </button>

                <button
                    class="delete"
                    onclick="deleteReminder(${index})">
                    Delete
                </button>

                <button
                    class="complete"
                    onclick="completeReminder(${index})">
                    ${item.completed ? "Undo" : "Done"}
                </button>

            </div>
        `;

        reminderList.appendChild(card);

    });

}

// Add Reminder Button
addBtn.addEventListener("click", () => {

    const title = titleInput.value.trim();
    const date = dateInput.value;
    const time = timeInput.value;

    if (title === "" || date === "" || time === "") {

        alert("Please fill all fields.");

        return;

    }

    const reminder = {

        title,
        date,
        time,
        completed: false,
        notified: false

    };

    if (editIndex === -1) {

        reminders.push(reminder);

    } else {

        reminder.completed = reminders[editIndex].completed;
        reminder.notified = reminders[editIndex].notified;

        reminders[editIndex] = reminder;

        editIndex = -1;

        addBtn.textContent = "Add Reminder";

    }

    saveReminders();

    displayReminders();

    titleInput.value = "";
    dateInput.value = "";
    timeInput.value = "";

});
// =====================================
// PREMIUM REMINDER APP
// PART 2
// Edit • Delete • Complete
// =====================================

// Edit Reminder
function editReminder(index) {

    const reminder = reminders[index];

    titleInput.value = reminder.title;
    dateInput.value = reminder.date;
    timeInput.value = reminder.time;

    editIndex = index;

    addBtn.textContent = "Update Reminder";

    titleInput.focus();

}

// Delete Reminder
function deleteReminder(index) {

    const confirmDelete = confirm(
        "Are you sure you want to delete this reminder?"
    );

    if (!confirmDelete) return;

    reminders.splice(index, 1);

    saveReminders();

    displayReminders();

}

// Mark Complete / Undo
function completeReminder(index) {

    reminders[index].completed =
        !reminders[index].completed;

    saveReminders();

    displayReminders();

}

// Sort reminders by Date & Time
function sortReminders() {

    reminders.sort((a, b) => {

        const first =
            new Date(a.date + "T" + a.time);

        const second =
            new Date(b.date + "T" + b.time);

        return first - second;

    });

}

// Update Display
function refreshApp() {

    sortReminders();

    saveReminders();

    displayReminders();

}

// Initial Sort
refreshApp();
// =====================================
// PREMIUM REMINDER APP
// PART 3
// Alarm + Notifications
// =====================================

// Ask notification permission
if ("Notification" in window) {

    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

}

// Play Alarm
function playAlarm(reminder) {

    // Play Alarm Sound
    if (alarm) {

        alarm.currentTime = 0;

        alarm.play().catch(() => {
            console.log("Alarm blocked until user interacts.");
        });

    }

    // Browser Notification
    if ("Notification" in window &&
        Notification.permission === "granted") {

        new Notification("⏰ Reminder", {
            body: reminder.title,
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
        });

    }

    // Popup
    alert("⏰ Reminder\n\n" + reminder.title);

}

// Check every second
function checkReminders() {

    const now = new Date();

    reminders.forEach((reminder) => {

        if (reminder.completed) return;

        if (reminder.notified) return;

        const reminderTime = new Date(
            reminder.date + "T" + reminder.time
        );

        if (now >= reminderTime) {

            reminder.notified = true;

            saveReminders();

            playAlarm(reminder);

        }

    });

}

// Run every second
setInterval(checkReminders, 1000);
// =====================================
// PREMIUM REMINDER APP
// PART 4
// App Initialization & Final Touches
// =====================================

// Load reminders when app starts
window.addEventListener("load", () => {

    // Display reminders
    displayReminders();

    // Sort reminders
    sortReminders();

    // Save sorted reminders
    saveReminders();

    // Set today's date as minimum selectable date
    const today = new Date().toISOString().split("T")[0];
    dateInput.min = today;

});

// Press Enter to Add Reminder
titleInput.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        addBtn.click();

    }

});

// Auto focus on title when page opens
window.onload = () => {

    titleInput.focus();

};

// Clear expired reminders after 30 days
function cleanOldReminders(){

    const now = new Date();

    reminders = reminders.filter(reminder=>{

        const reminderDate = new Date(
            reminder.date + "T" + reminder.time
        );

        const diff =
            now - reminderDate;

        return diff < 1000 * 60 * 60 * 24 * 30;

    });

    saveReminders();

    displayReminders();

}

// Run cleanup once
cleanOldReminders();

// Refresh reminder list every minute
setInterval(() => {

    displayReminders();

},60000);

// =====================================
// END OF PREMIUM REMINDER APP
// =====================================
</script>

</body>
</html>
